# ============================================
# 项目基础配置
# ============================================
company: "通用催收"
start_module: "身份确认"

# 任务标识（仅名称，不含数量和种子，程序会自动组合）
task_name: "general_v2"

# 根输出目录
output_dir: "output"

# 路径缓存目录（相对于 output_dir 或绝对路径）
paths_cache_dir: "paths"   # 最终路径为 output/paths/

# 路径缓存文件模板（基于 output_dir 和 paths_cache_dir 生成）
# 注意：main.py 中会动态拼接
# paths_cache: "output/paths/all_paths_{num_paths}_{seed}.json"

# ============================================
# 生成数量与随机种子
# ============================================
num_paths: 40000
random_seed: 42

# 断点续传间隔（保存检查点的对话条数）
checkpoint_interval: 5000

# ============================================
# 数据文件路径
# ============================================
excel_path: "datas/General_regulations/【生成式通用】电催话术通用模板-首催 - 20260330.xlsx"
prob_path: "datas/General_regulations/prob.xlsx"
cases_dir: "datas/cases"

# ============================================
# 模块定义
# ============================================
modules:
  - "身份确认"
  - "告知"
  - "信息核实"
  - "三方"
  - "转告"
  - "承诺还款"
  - "已还款"
  - "敷衍"
  - "投诉处理"
  - "信息问题"
  - "不方便接电"
  - "对抗"
  - "没钱"
  - "诉求"
  - "通用原因"
  - "否认办理业务"
  - "工程款"
  - "未发工资"
  - "还错卡"
  - "生病住院"
  - "破产"
  - "失业"
  - "他人用款"
  - "忘记还款"
  - "盗刷"

# ============================================
# 业务规则
# ============================================
max_repeat:
  身份确认: 4
  告知: 1
  信息核实: 1
  三方: 1
  转告: 1
  承诺还款: 2
  已还款: 1
  敷衍: 3
  投诉处理: 3
  信息问题: 3
  不方便接电: 2
  对抗: 4
  没钱: 4
  诉求: 3
  通用原因: 4
  否认办理业务: 4
  工程款: 4
  未发工资: 4
  还错卡: 4
  生病住院: 4
  破产: 4
  失业: 4
  他人用款: 4
  忘记还款: 4
  盗刷: 4

a_set:
  - "通用原因"
  - "否认办理业务"
  - "工程款"
  - "未发工资"
  - "还错卡"
  - "生病住院"
  - "破产"
  - "失业"
  - "他人用款"
  - "忘记还款"
  - "盗刷"

b_set:
  - "敷衍"
  - "投诉处理"
  - "信息问题"
  - "不方便接电"
  - "对抗"
  - "没钱"
  - "诉求"
  - "承诺还款"

terminal_modules:
  - "承诺还款"   # 如果需要路径中允许多次承诺，请取消注释；当前只以“已还款”为终止
  - "已还款"

# 需要附加施压话术的模块
insert_nodes:
  - "失业"
  - "破产"
  - "生病住院"
  - "未发工资"
  - "工程款"
  - "通用原因"
  - "没钱"

# ============================================
# 施压话术配置
# ============================================
# 固定施压概率（仅在 pressure_dynamic_enabled=false 时使用）
pressure_prob: 0.3

# 动态施压概率开关
pressure_dynamic_enabled: true
pressure_start_prob: 0.02        # 路径开头概率
pressure_end_prob: 0.6           # 路径末尾概率
pressure_curve_exponent: 2.5     # 指数，越大后期增长越快
pressure_max_total: 3            # 每条对话最多施压次数（设置很大如999可视为无限制）

# 模块权重（仅 insert_nodes 中的模块，默认权重为1.0）
module_pressure_weights:
  没钱: 1.2
  失业: 1.0
  破产: 1.0
  生病住院: 1.0
  未发工资: 1.0
  工程款: 1.0
  通用原因: 0.9

# ============================================
# 再见终止与继承链停止概率
# ============================================
goodbye_termination_prob: 0.7      # 遇到“是否再见=1”时终止对话的概率
flexible_stop_prob: 0.3           # 后代链停止概率（当 flexible_stop=1 时）

# ============================================
# 条件解析器
# ============================================
condition_parser: "keyword"        # keyword | simple_eval (future)

# ============================================
# 扩展列名（若 Excel 列名不同可修改）
# ============================================
keep_columns:
  - "uid"
  - "parent(继承)"
  - "repeat(次数)"
  - "conditions(条件)"
  - "human(客户)"
  - "assistant(专员)"
  - "flexible_stop(可选不继承)"
  - "是否再见"

# ============================================
# 追踪配置
# ============================================
trace_enabled: true                # 是否启用详细追踪（生成 trace 文件）
# 注意：trace_output_dir 不再需要，程序会自动放到任务子目录下的 intermediate/traces/

# ============================================
# 日志配置
# ============================================
logging:
  level: "DEBUG"
  # log_dir 不再需要，程序会自动放到任务子目录下的 intermediate/logs/
  file_prefix: "dialogue_builder"
  console: true
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"